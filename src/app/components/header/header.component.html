<nav
  [class]="navClasses()"
  role="navigation"
  aria-label="Main navigation"
  style="backdrop-filter: blur(12px)"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <button
        (click)="scrollToTop()"
        class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent hover:opacity-80 transition-opacity cursor-pointer border-0 p-0 m-0"
      >
        Portfolio
      </button>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex space-x-8">
        @for (link of navLinks(); track link.href) {
          <a [href]="link.href" [class]="navLinkClasses()">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Theme Toggle and Mobile Menu Button -->
      <div class="flex items-center gap-4">
        <!-- Theme Toggle Component -->
        <app-theme-toggle />

        <!-- Language Selector Component -->
        <app-language-selector />

        <!-- Mobile Menu Button -->
        <button
          [class]="mobileMenuButtonClasses()"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="mobileMenuOpen()"
          aria-label="Toggle mobile menu"
        >
          @if (mobileMenuOpen()) {
            <app-icon iconName="x" />
          } @else {
            <app-icon iconName="menu" />
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen()) {
    <div [class]="mobileMenuClasses()" role="region" aria-label="Mobile navigation">
      <div class="px-4 pt-2 pb-4 space-y-2">
        @for (link of navLinks(); track link.href) {
          <a
            [href]="link.href"
            class="block py-2"
            [class]="navLinkClasses()"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </div>
  }
</nav>
