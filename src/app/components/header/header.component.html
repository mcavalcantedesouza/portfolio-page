<nav
  class="fixed top-0 w-full z-50 border-b transition-all duration-300"
  [class.bg-slate-900/80]="themeService.isDarkMode()"
  [class.bg-white/80]="!themeService.isDarkMode()"
  [class.border-slate-700]="themeService.isDarkMode()"
  [class.border-gray-200]="!themeService.isDarkMode()"
  role="navigation"
  aria-label="Main navigation"
  style="backdrop-filter: blur(12px)"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <button
        (click)="scrollToTop()"
        class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent hover:opacity-80 transition-opacity cursor-pointer border-0 p-0 m-0"
      >
        Portfolio
      </button>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex space-x-8">
        @for (link of navLinks(); track link.href) {
          <a
            [href]="link.href"
            class="transition-colors duration-300"
            [class.text-slate-300]="themeService.isDarkMode()"
            [class.hover:text-blue-400]="themeService.isDarkMode()"
            [class.text-gray-700]="!themeService.isDarkMode()"
            [class.hover:text-blue-600]="!themeService.isDarkMode()"
          >
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Theme Toggle and Mobile Menu Button -->
      <div class="flex items-center gap-4">
        <!-- Theme Toggle Component -->
        <app-theme-toggle />

        <!-- Language Selector Component -->
        <app-language-selector />

        <!-- Mobile Menu Button -->
        <button
          class="md:hidden p-2 rounded-lg transition-colors"
          [class.bg-slate-800]="themeService.isDarkMode()"
          [class.hover:bg-slate-700]="themeService.isDarkMode()"
          [class.bg-gray-100]="!themeService.isDarkMode()"
          [class.hover:bg-gray-200]="!themeService.isDarkMode()"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="mobileMenuOpen()"
          aria-label="Toggle mobile menu"
        >
          @if (mobileMenuOpen()) {
            <app-icon iconName="x" />
          } @else {
            <app-icon iconName="menu" />
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen()) {
    <div
      class="md:hidden border-t transition-all duration-300 animate-in fade-in slide-in-from-top-2"
      [class.bg-slate-800]="themeService.isDarkMode()"
      [class.border-slate-700]="themeService.isDarkMode()"
      [class.bg-gray-50]="!themeService.isDarkMode()"
      [class.border-gray-200]="!themeService.isDarkMode()"
      role="region"
      aria-label="Mobile navigation"
    >
      <div class="px-4 pt-2 pb-4 space-y-2">
        @for (link of navLinks(); track link.href) {
          <a
            [href]="link.href"
            class="block py-2 transition-colors duration-300"
            [class.text-slate-300]="themeService.isDarkMode()"
            [class.hover:text-blue-400]="themeService.isDarkMode()"
            [class.text-gray-700]="!themeService.isDarkMode()"
            [class.hover:text-blue-600]="!themeService.isDarkMode()"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </div>
  }
</nav>
