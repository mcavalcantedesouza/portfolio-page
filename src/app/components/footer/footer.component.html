<footer
  class="py-8 px-4 border-t transition-all duration-300"
  [class.bg-slate-900]="themeService.isDarkMode()"
  [class.text-slate-400]="themeService.isDarkMode()"
  [class.border-slate-700]="themeService.isDarkMode()"
  [class.bg-white]="!themeService.isDarkMode()"
  [class.text-gray-600]="!themeService.isDarkMode()"
  [class.border-gray-200]="!themeService.isDarkMode()"
  role="contentinfo"
>
  <div class="max-w-7xl mx-auto text-center">
    <p>&copy; 2024 {{ portfolio().name }}. All rights reserved.</p>
  </div>
</footer>
