<section id="skills" [class]="sectionClasses()" role="region" aria-labelledby="skills-title">
  <div class="max-w-7xl mx-auto">
    <h2 id="skills-title" [class]="titleClasses()">
      {{ languageService.currentTranslations().skills.title }}
    </h2>
    <div class="grid md:grid-cols-3 gap-8">
      @for (skill of skills(); track skill.id) {
        <app-skill-card [skillData]="skill" />
      }
    </div>
  </div>
</section>
