<section id="contact" [class]="sectionClasses()" role="region" aria-labelledby="contact-title">
  <div class="max-w-4xl mx-auto text-center">
    <h2 id="contact-title" [class]="titleClasses()">
      {{ translations().contact.title }}
    </h2>
    <p [class]="descriptionClasses()">
      {{ translations().contact.description }}
    </p>

    <!-- Social Links -->
    <div class="flex flex-wrap justify-center gap-4 mb-12">
      @for (social of socialLinks(); track social.label) {
        <a
          [href]="social.href"
          [target]="social.external ? '_blank' : '_self'"
          [rel]="social.external ? 'noopener noreferrer' : ''"
          [class]="socialButtonClasses()"
          [attr.aria-label]="'Contact via ' + social.label"
        >
          <app-icon [iconName]="social.iconName" class="flex-shrink-0" />
          {{ social.label }}
        </a>
      }
    </div>
  </div>
</section>
