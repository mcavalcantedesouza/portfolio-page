<section id="about" [ngClass]="sectionClasses()" role="region" aria-labelledby="about-title">
  <div class="max-w-5xl mx-auto">
    <h2 id="about-title" [ngClass]="titleClasses()">
      {{ translations().about.title }}
    </h2>
    <div [ngClass]="cardClasses()">
      <p [ngClass]="textClasses() + ' mb-6'">
        {{ translations().about.description }}
      </p>
      <p [ngClass]="textClasses()">
        {{ translations().about.bio }}
      </p>
    </div>
  </div>
</section>
