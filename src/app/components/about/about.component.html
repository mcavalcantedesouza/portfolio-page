<section
  id="about"
  class="py-20 px-4 sm:px-6 lg:px-8 transition-all duration-300"
  [class.bg-slate-800]="themeService.isDarkMode()"
  [class.bg-gray-100]="!themeService.isDarkMode()"
  role="region"
  aria-labelledby="about-title"
>
  <div class="max-w-5xl mx-auto">
    <h2
      id="about-title"
      class="text-4xl md:text-5xl font-bold mb-12 text-center transition-colors duration-300"
      [class.text-white]="themeService.isDarkMode()"
      [class.text-gray-900]="!themeService.isDarkMode()"
    >
      {{ translations().about.title }}
    </h2>
    <div
      class="rounded-2xl p-8 md:p-12 shadow-xl border transition-all duration-300"
      [class.bg-gradient-to-br]="true"
      [class.from-slate-700]="themeService.isDarkMode()"
      [class.to-slate-700]="themeService.isDarkMode()"
      [class.border-blue-500/20]="themeService.isDarkMode()"
      [class.from-gray-50]="!themeService.isDarkMode()"
      [class.to-gray-50]="!themeService.isDarkMode()"
      [class.border-blue-200]="!themeService.isDarkMode()"
    >
      <p
        class="text-lg leading-relaxed mb-6 transition-colors duration-300"
        [class.text-slate-200]="themeService.isDarkMode()"
        [class.text-gray-700]="!themeService.isDarkMode()"
      >
        {{ translations().about.description }}
      </p>
      <p
        class="text-lg leading-relaxed transition-colors duration-300"
        [class.text-slate-200]="themeService.isDarkMode()"
        [class.text-gray-700]="!themeService.isDarkMode()"
      >
        {{ translations().about.bio }}
      </p>
    </div>
  </div>
</section>
